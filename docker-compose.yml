services:
    sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: sqlserver-fcg-users
        environment:
            - ACCEPT_EULA=Y
            - SA_PASSWORD=YourPassword123
            - MSSQL_PID=Developer
            - MSSQL_DATABASE=fcg_user
        ports:
            - "1433:1433"
        volumes:
            - sqlserver_data:/var/opt/mssql
        networks:
            - network-fcg
        healthcheck:
            test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourPassword123" -Q "SELECT 1" -C || exit 1
            interval: 10s
            timeout: 3s
            retries: 10
            start_period: 10s

    loki:
        image: grafana/loki:latest
        container_name: loki-fcg-users
        ports:
            - "3100:3100"
        command: -config.file=/etc/loki/local-config.yaml
        configs:
            - source: loki_config
              target: /etc/loki/local-config.yaml
        volumes:
            - loki_data:/loki
        networks:
            - network-fcg

    tempo:
        image: grafana/tempo:latest
        container_name: tempo-fcg-users
        user: root
        ports:
            - "3200:3200"
            - "4317:4317"
        command: -config.file=/etc/tempo/tempo-config.yaml
        configs:
            - source: tempo_config
              target: /etc/tempo/tempo-config.yaml
        volumes:
            - tempo_data:/tmp/tempo
        networks:
            - network-fcg

    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus-fcg-users
        ports:
            - "9090:9090"
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=7d
        configs:
            - source: prometheus_config
              target: /etc/prometheus/prometheus.yml
        volumes:
            - prometheus_data:/prometheus
        networks:
            - network-fcg
        depends_on:
            - fcg-users

    grafana:
        image: grafana/grafana:latest
        container_name: grafana-fcg-users
        ports:
            - "3000:3000"
        environment:
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
            - GF_AUTH_DISABLE_LOGIN_FORM=true
        configs:
            - source: grafana_datasources
              target: /etc/grafana/provisioning/datasources/datasources.yaml
        volumes:
            - grafana_data:/var/lib/grafana
        networks:
            - network-fcg
        depends_on:
            - loki
            - tempo
            - prometheus

    fcg-users:
        build:
            context: .
            dockerfile: src/FCG.Users.WebApi/Dockerfile
        container_name: fcg-users
        depends_on:
            sqlserver:
                condition: service_healthy
            loki:
                condition: service_started
            tempo:
                condition: service_started
            kafka:
                condition: service_healthy
        ports:
            - "5050:8080"
            - "5051:8081"
        environment:
            - ASPNETCORE_ENVIRONMENT=Docker
            - ASPNETCORE_URLS=http://+:8080;http://+:8081
        networks:
            - network-fcg
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        container_name: zookeeper
        ports:
            - "2181:2181"
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000
        volumes:
            - zookeeper_data:/var/lib/zookeeper/data
            - zookeeper_logs:/var/lib/zookeeper/log
        networks:
            - network-fcg

    kafka:
        image: confluentinc/cp-kafka:7.5.0
        container_name: kafka
        depends_on:
            - zookeeper
        ports:
            - "9092:9092"
            - "29092:29092"
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
            KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        volumes:
            - kafka_data:/var/lib/kafka/data
        networks:
            - network-fcg
        restart: always
        healthcheck:
            test: kafka-broker-api-versions --bootstrap-server kafka:9092 || exit 1
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        ports:
            - "8081:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
            KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
            KAFKA_CLUSTERS_0_READONLY: "false"
            DYNAMIC_CONFIG_ENABLED: "true"
        depends_on:
            - kafka
        networks:
            - network-fcg

configs:
    loki_config:
        content: |
            auth_enabled: false
            server:
              http_listen_port: 3100
            common:
              ring:
                instance_addr: 127.0.0.1
                kvstore:
                  store: inmemory
              replication_factor: 1
              path_prefix: /loki
            schema_config:
              configs:
                - from: 2020-10-24
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: index_
                    period: 24h
            storage_config:
              filesystem:
                directory: /loki/chunks
            limits_config:
              reject_old_samples: true
              reject_old_samples_max_age: 168h

    tempo_config:
        content: |
            server:
              http_listen_port: 3200
            distributor:
              receivers:
                otlp:
                  protocols:
                    grpc:
                      endpoint: 0.0.0.0:4317
            storage:
              trace:
                backend: local
                local:
                  path: /tmp/tempo/blocks
                wal:
                  path: /tmp/tempo/wal

    prometheus_config:
        content: |
            global:
              scrape_interval: 15s
              evaluation_interval: 15s
            scrape_configs:
              - job_name: 'fcg-users'
                static_configs:
                  - targets: ['fcg-users:8080']
                metrics_path: '/metrics'

    grafana_datasources:
        content: |
            apiVersion: 1
            datasources:
              - name: Loki
                type: loki
                access: proxy
                url: http://loki:3100
                isDefault: false
              - name: Prometheus
                type: prometheus
                access: proxy
                url: http://prometheus:9090
                isDefault: true
              - name: Tempo
                type: tempo
                access: proxy
                url: http://tempo:3200
                isDefault: false
                jsonData:
                  tracesToLogsV2:
                    datasourceUid: loki
                    filterByTraceID: true
                    filterBySpanID: true
                  nodeGraph:
                    enabled: true

volumes:
    sqlserver_data:
    zookeeper_data:
    zookeeper_logs:
    kafka_data:
    loki_data:
    tempo_data:
    prometheus_data:
    grafana_data:

networks:
    network-fcg:
        driver: bridge